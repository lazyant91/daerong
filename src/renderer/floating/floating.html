<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Image</title>
  <link rel="stylesheet" href="../assets/themes.css">
  <link rel="stylesheet" href="floating.css">
</head>
<body>
  <div id="container" class="floating-container">
    <div class="drag-overlay" id="drag-overlay"></div>
    <img id="floating-image" class="floating-image" src="" alt="Floating Image" />
    
    <!-- Controls Overlay (Hover) -->
    <div id="controls" class="controls-overlay">
      <!-- Opacity Slider Container -->
      <div class="slider-container" title="불투명도 조절">
        <span class="slider-icon">🌓</span>
        <input type="range" id="opacity-slider" min="0.1" max="1.0" step="0.05" value="1.0">
      </div>
      
      <!-- Pin (Always on Top) Toggle Button -->
      <button id="pin-btn" class="control-btn pin-btn" title="항상 위 토글">
        <svg class="icon" viewBox="0 0 24 24" width="12" height="12">
          <path fill="currentColor" d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/>
        </svg>
      </button>
      
      <!-- Trash (Delete) Button -->
      <button id="delete-btn" class="control-btn delete-btn" title="닫기">
        <svg class="icon" viewBox="0 0 24 24" width="12" height="12">
          <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="floating.js"></script>
</body>
</html>
